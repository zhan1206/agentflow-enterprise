server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"

database:
  driver: "postgres"
  host: "localhost"
  port: 5432
  name: "agentflow"
  user: "agentflow"
  password: "${DB_PASSWORD}"
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: "localhost"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 0

kafka:
  brokers:
    - "localhost:9092"
  topic_tasks: "agentflow-tasks"
  topic_events: "agentflow-events"

security:
  jwt_secret: "${JWT_SECRET}"
  jwt_expiry_hours: 24

sync:
  node_id: "node-1"
  data_dir: "./data/raft"
  bootstrap: true
  peers: []

scheduler:
  workers: 10
  queue_size: 1000

tracing:
  enabled: true
  provider: "jaeger"
  endpoint: "http://localhost:14268/api/traces"
  sampling_rate: 0.1

logging:
  level: "info"
  format: "json"
